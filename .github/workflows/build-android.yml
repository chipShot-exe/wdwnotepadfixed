name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          
      - name: Capacitor Sync
        run: |
          npx cap add android || true 
          npx cap sync android 

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Force Fix Android Build Tools Path
        run: |
          # 1. Find where the real build-tools are
          REAL_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -n 1)
          
          # 2. Create the "fake" directory the signing tool wants
          sudo mkdir -p /usr/local/lib/android/sdk/build-tools/29.0.3
          
          # 3. Link the real tools (zipalign, etc.) into that fake directory
          sudo ln -s $REAL_PATH/* /usr/local/lib/android/sdk/build-tools/29.0.3/
          
          echo "Linked $REAL_PATH to the expected 29.0.3 path"

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: disney-notepad-release
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
